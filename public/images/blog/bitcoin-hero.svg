<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="A bitcoin coin paired with an audio waveform on a deep navy background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0904f"/>
      <stop offset="1" stop-color="#e57329"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0904f"/>
      <stop offset="1" stop-color="#e57329"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#e57329" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e57329" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow)"/>
  <line x1="0" y1="420" x2="1600" y2="420" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>

  <!-- waveform building toward the coin -->
  <g fill="url(#wave)">
    <rect x="150" y="392" width="16" height="56"  rx="8"/>
    <rect x="196" y="356" width="16" height="128" rx="8"/>
    <rect x="242" y="300" width="16" height="240" rx="8"/>
    <rect x="288" y="360" width="16" height="120" rx="8"/>
    <rect x="334" y="250" width="16" height="340" rx="8"/>
    <rect x="380" y="330" width="16" height="180" rx="8"/>
    <rect x="426" y="200" width="16" height="440" rx="8"/>
    <rect x="472" y="330" width="16" height="180" rx="8"/>
    <rect x="518" y="270" width="16" height="300" rx="8"/>
    <rect x="564" y="350" width="16" height="140" rx="8"/>
    <rect x="610" y="220" width="16" height="400" rx="8"/>
    <rect x="656" y="300" width="16" height="240" rx="8"/>
    <rect x="702" y="160" width="16" height="520" rx="8"/>
    <rect x="748" y="300" width="16" height="240" rx="8"/>
    <rect x="794" y="240" width="16" height="360" rx="8"/>
  </g>

  <!-- concentric sound rings around the coin -->
  <g fill="none" stroke="#f0904f" stroke-opacity="0.18">
    <circle cx="1120" cy="420" r="210" stroke-width="2"/>
    <circle cx="1120" cy="420" r="260" stroke-width="2" stroke-opacity="0.1"/>
  </g>

  <!-- bitcoin coin -->
  <g transform="translate(1120 420)">
    <circle r="150" fill="url(#coin)"/>
    <circle r="150" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
    <!-- official Bitcoin ₿ mark, scaled from the logo (viewBox 4091.27²,
         centre 2045.635/2045.865, r≈2045.2) into the r=150 coin -->
    <path fill="#ffffff" transform="scale(0.07334) translate(-2045.635 -2045.865)" d="M2947.77 1754.38c40.72,-272.26 -166.56,-418.61 -450,-516.24l91.95 -368.8 -224.5 -55.94 -89.51 359.09c-59.02,-14.72 -119.63,-28.59 -179.87,-42.34l90.16 -361.46 -224.36 -55.94 -92 368.68c-48.84,-11.12 -96.81,-22.11 -143.35,-33.69l0.26 -1.16 -309.59 -77.31 -59.72 239.78c0,0 166.56,38.18 163.05,40.53 90.91,22.69 107.35,82.87 104.62,130.57l-104.74 420.15c6.26,1.59 14.38,3.89 23.34,7.49 -7.49,-1.86 -15.46,-3.89 -23.73,-5.87l-146.81 588.57c-11.11,27.62 -39.31,69.07 -102.87,53.33 2.25,3.26 -163.17,-40.72 -163.17,-40.72l-111.46 256.98 292.15 72.83c54.35,13.63 107.61,27.89 160.06,41.3l-92.9 373.03 224.24 55.94 92 -369.07c61.26,16.63 120.71,31.97 178.91,46.43l-91.69 367.33 224.51 55.94 92.89 -372.33c382.82,72.45 670.67,43.24 791.83,-303.02 97.63,-278.78 -4.86,-439.58 -206.26,-544.44 146.69,-33.83 257.18,-130.31 286.64,-329.61l-0.07 -0.05zm-512.93 719.26c-69.38,278.78 -538.76,128.08 -690.94,90.29l123.28 -494.2c152.17,37.99 640.17,113.17 567.67,403.91zm69.43 -723.3c-63.29,253.58 -453.96,124.75 -580.69,93.16l111.77 -448.21c126.73,31.59 534.85,90.55 468.94,355.05l-0.02 0z"/>
  </g>
</svg>
