<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="Abstract search magnifier over an audio waveform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0904f"/>
      <stop offset="1" stop-color="#e57329"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#e57329" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#e57329" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow)"/>
  <!-- faux search bar -->
  <g transform="translate(300 150)">
    <rect x="0" y="0" width="1000" height="96" rx="48" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="60" cy="48" r="20" fill="none" stroke="#f0904f" stroke-width="6"/>
    <line x1="75" y1="63" x2="92" y2="80" stroke="#f0904f" stroke-width="6" stroke-linecap="round"/>
    <rect x="120" y="38" width="360" height="20" rx="10" fill="#ffffff" fill-opacity="0.25"/>
  </g>
  <!-- waveform -->
  <g fill="url(#wave)" transform="translate(0 40)">
    <rect x="300" y="470" width="18" height="120" rx="9"/>
    <rect x="352" y="410" width="18" height="240" rx="9"/>
    <rect x="404" y="330" width="18" height="400" rx="9"/>
    <rect x="456" y="450" width="18" height="160" rx="9"/>
    <rect x="508" y="360" width="18" height="340" rx="9"/>
    <rect x="560" y="280" width="18" height="500" rx="9"/>
    <rect x="612" y="420" width="18" height="220" rx="9"/>
    <rect x="664" y="340" width="18" height="380" rx="9"/>
    <rect x="716" y="440" width="18" height="180" rx="9"/>
    <rect x="768" y="300" width="18" height="460" rx="9"/>
    <rect x="820" y="400" width="18" height="260" rx="9"/>
    <rect x="872" y="470" width="18" height="120" rx="9"/>
    <rect x="924" y="360" width="18" height="340" rx="9"/>
    <rect x="976" y="430" width="18" height="200" rx="9"/>
  </g>
  <!-- magnifier over the wave -->
  <g transform="translate(1030 520)">
    <circle r="150" fill="#26374e" fill-opacity="0.35"/>
    <circle r="150" fill="none" stroke="#f0904f" stroke-width="14"/>
    <circle r="150" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>
    <line x1="106" y1="106" x2="210" y2="210" stroke="#f0904f" stroke-width="26" stroke-linecap="round"/>
    <g fill="#ffffff">
      <rect x="-70" y="-14" width="18" height="28" rx="9" fill-opacity="0.6"/>
      <rect x="-42" y="-44" width="18" height="88" rx="9"/>
      <rect x="-14" y="-24" width="18" height="48" rx="9" fill-opacity="0.6"/>
      <rect x="14"  y="-58" width="18" height="116" rx="9"/>
      <rect x="42"  y="-30" width="18" height="60" rx="9" fill-opacity="0.6"/>
    </g>
  </g>
</svg>
