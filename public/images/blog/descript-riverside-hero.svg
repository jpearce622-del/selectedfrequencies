<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="A split comparison graphic representing Riverside recording on one side and Descript editing on the other" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.28" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e57329" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e57329" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.72" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0904f" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#f0904f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glowL)"/>
  <rect width="1600" height="840" fill="url(#glowR)"/>

  <!-- LEFT: recording (record dot + concentric rings + waveform) -->
  <g transform="translate(400 420)">
    <circle r="150" fill="none" stroke="#f0904f" stroke-opacity="0.14" stroke-width="2"/>
    <circle r="110" fill="none" stroke="#f0904f" stroke-opacity="0.22" stroke-width="2"/>
    <circle r="70" fill="#e57329"/>
    <circle r="70" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
    <circle r="26" fill="#ffffff"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.85" transform="translate(400 640)">
    <rect x="-70" y="-16" width="10" height="32" rx="5" fill-opacity="0.5"/>
    <rect x="-48" y="-34" width="10" height="68" rx="5"/>
    <rect x="-26" y="-52" width="10" height="104" rx="5" fill="#f0904f"/>
    <rect x="-4"  y="-28" width="10" height="56" rx="5"/>
    <rect x="18"  y="-46" width="10" height="92" rx="5"/>
    <rect x="40"  y="-20" width="10" height="40" rx="5" fill-opacity="0.5"/>
  </g>
  <text x="400" y="726" text-anchor="middle" font-size="26" font-weight="600" fill="#ffffff" fill-opacity="0.55" letter-spacing="1">RECORD</text>

  <!-- centre VS badge -->
  <g transform="translate(800 420)">
    <line x1="0" y1="-300" x2="0" y2="300" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="4 14"/>
    <circle r="66" fill="#ffffff"/>
    <text x="0" y="18" text-anchor="middle" font-size="44" font-weight="800" fill="#26374e">vs</text>
  </g>

  <!-- RIGHT: editing (transcript lines with cursor + a highlighted deleted word) -->
  <g transform="translate(1050 300)">
    <rect x="0" y="0" width="420" height="240" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <g fill="#ffffff" fill-opacity="0.5">
      <rect x="32" y="44"  width="300" height="16" rx="8"/>
      <rect x="32" y="86"  width="356" height="16" rx="8"/>
      <rect x="32" y="128" width="220" height="16" rx="8"/>
      <rect x="32" y="170" width="320" height="16" rx="8"/>
    </g>
    <!-- struck-through "deleted" word -->
    <rect x="264" y="122" width="72" height="26" rx="6" fill="#e57329" fill-opacity="0.25"/>
    <line x1="264" y1="135" x2="336" y2="135" stroke="#f0904f" stroke-width="3"/>
    <!-- text cursor -->
    <rect x="360" y="80" width="3" height="28" fill="#f0904f"/>
  </g>
  <text x="1260" y="620" text-anchor="middle" font-size="26" font-weight="600" fill="#ffffff" fill-opacity="0.55" letter-spacing="1">EDIT</text>
</svg>
