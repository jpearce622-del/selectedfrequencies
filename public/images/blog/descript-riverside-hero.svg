<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="A comparison graphic: Riverside as a remote recording studio with guest tiles on the left, Descript as a transcript editor on the right" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.26" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b7bf5" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b7bf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.74" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4d90f5" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#4d90f5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glowL)"/>
  <rect width="1600" height="840" fill="url(#glowR)"/>

  <!-- ===== LEFT: Riverside — remote recording studio ===== -->
  <g transform="translate(150 280)">
    <rect width="460" height="280" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#8b7bf5" stroke-opacity="0.35" stroke-width="2"/>

    <!-- live REC pill -->
    <g transform="translate(28 26)">
      <rect width="96" height="32" rx="16" fill="#ffffff" fill-opacity="0.08"/>
      <circle cx="19" cy="16" r="6.5" fill="#ff5a52"/>
      <text x="37" y="22" font-size="17" font-weight="700" fill="#ffffff" fill-opacity="0.72" letter-spacing="1">REC</text>
    </g>
    <text x="432" y="47" text-anchor="end" font-size="18" font-weight="600" fill="#ffffff" fill-opacity="0.4">28:14</text>

    <!-- two remote guest tiles -->
    <g transform="translate(28 76)">
      <rect width="192" height="122" rx="14" fill="#22334d"/>
      <rect x="212" width="192" height="122" rx="14" fill="#22334d"/>
      <g fill="#8b7bf5" fill-opacity="0.9">
        <g transform="translate(96 0)">
          <circle cy="50" r="20"/>
          <path d="M0 76 c -26 0 -40 20 -42 46 h 84 c -2 -26 -16 -46 -42 -46 z"/>
        </g>
        <g transform="translate(308 0)">
          <circle cy="50" r="20"/>
          <path d="M0 76 c -26 0 -40 20 -42 46 h 84 c -2 -26 -16 -46 -42 -46 z"/>
        </g>
      </g>
    </g>

    <!-- high-quality capture waveform -->
    <g transform="translate(38 236)" fill="#8b7bf5">
      <rect x="0"   y="-7"  width="5" height="14" rx="2.5" fill-opacity="0.5"/>
      <rect x="24"  y="-13" width="5" height="26" rx="2.5" fill-opacity="0.7"/>
      <rect x="48"  y="-20" width="5" height="40" rx="2.5"/>
      <rect x="72"  y="-11" width="5" height="22" rx="2.5" fill-opacity="0.7"/>
      <rect x="96"  y="-17" width="5" height="34" rx="2.5" fill-opacity="0.85"/>
      <rect x="120" y="-25" width="5" height="50" rx="2.5"/>
      <rect x="144" y="-15" width="5" height="30" rx="2.5" fill-opacity="0.8"/>
      <rect x="168" y="-22" width="5" height="44" rx="2.5"/>
      <rect x="192" y="-10" width="5" height="20" rx="2.5" fill-opacity="0.6"/>
      <rect x="216" y="-19" width="5" height="38" rx="2.5" fill-opacity="0.85"/>
      <rect x="240" y="-14" width="5" height="28" rx="2.5" fill-opacity="0.7"/>
      <rect x="264" y="-23" width="5" height="46" rx="2.5"/>
      <rect x="288" y="-12" width="5" height="24" rx="2.5" fill-opacity="0.7"/>
      <rect x="312" y="-18" width="5" height="36" rx="2.5" fill-opacity="0.85"/>
      <rect x="336" y="-9"  width="5" height="18" rx="2.5" fill-opacity="0.55"/>
      <rect x="360" y="-15" width="5" height="30" rx="2.5" fill-opacity="0.7"/>
    </g>
  </g>
  <text x="380" y="606" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff" fill-opacity="0.82" letter-spacing="2">RIVERSIDE</text>
  <text x="380" y="634" text-anchor="middle" font-size="14" font-weight="600" fill="#8b7bf5" fill-opacity="0.9" letter-spacing="3">RECORDING</text>

  <!-- ===== centre VS badge ===== -->
  <g transform="translate(800 420)">
    <line x1="0" y1="-250" x2="0" y2="250" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="4 14"/>
    <circle r="58" fill="#ffffff"/>
    <text x="0" y="16" text-anchor="middle" font-size="40" font-weight="800" fill="#26374e">vs</text>
  </g>

  <!-- ===== RIGHT: Descript — transcript editor ===== -->
  <g transform="translate(990 280)">
    <rect width="460" height="280" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#4d90f5" stroke-opacity="0.35" stroke-width="2"/>

    <!-- transcript: speaker + text lines, one word selected, cursor -->
    <g transform="translate(30 32)">
      <circle cx="12" cy="12" r="12" fill="#4d90f5" fill-opacity="0.85"/>
      <rect x="34" y="5" width="92" height="14" rx="7" fill="#ffffff" fill-opacity="0.35"/>
      <g fill="#ffffff" fill-opacity="0.5">
        <rect x="0" y="44"  width="394" height="15" rx="7.5"/>
        <rect x="0" y="76"  width="320" height="15" rx="7.5"/>
        <rect x="0" y="108" width="394" height="15" rx="7.5"/>
        <rect x="0" y="140" width="250" height="15" rx="7.5"/>
      </g>
      <!-- selected word on line 2 -->
      <rect x="150" y="72" width="86" height="23" rx="6" fill="#4d90f5" fill-opacity="0.30" stroke="#4d90f5" stroke-opacity="0.65" stroke-width="1.5"/>
      <!-- text cursor -->
      <rect x="240" y="73" width="2.5" height="21" fill="#4d90f5"/>
    </g>

    <!-- audio-under-text waveform -->
    <g transform="translate(30 214)" fill="#4d90f5" fill-opacity="0.55">
      <rect x="0"   y="-6"  width="4" height="12" rx="2"/>
      <rect x="19"  y="-11" width="4" height="22" rx="2"/>
      <rect x="38"  y="-16" width="4" height="32" rx="2"/>
      <rect x="57"  y="-9"  width="4" height="18" rx="2"/>
      <rect x="76"  y="-13" width="4" height="26" rx="2"/>
      <rect x="95"  y="-19" width="4" height="38" rx="2"/>
      <rect x="114" y="-11" width="4" height="22" rx="2"/>
      <rect x="133" y="-17" width="4" height="34" rx="2"/>
      <rect x="152" y="-8"  width="4" height="16" rx="2"/>
      <rect x="171" y="-14" width="4" height="28" rx="2"/>
      <rect x="190" y="-10" width="4" height="20" rx="2"/>
      <rect x="209" y="-18" width="4" height="36" rx="2"/>
      <rect x="228" y="-12" width="4" height="24" rx="2"/>
      <rect x="247" y="-16" width="4" height="32" rx="2"/>
      <rect x="266" y="-8"  width="4" height="16" rx="2"/>
      <rect x="285" y="-13" width="4" height="26" rx="2"/>
      <rect x="304" y="-19" width="4" height="38" rx="2"/>
      <rect x="323" y="-10" width="4" height="20" rx="2"/>
      <rect x="342" y="-15" width="4" height="30" rx="2"/>
      <rect x="361" y="-9"  width="4" height="18" rx="2"/>
      <rect x="380" y="-12" width="4" height="24" rx="2"/>
    </g>
  </g>
  <text x="1220" y="606" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff" fill-opacity="0.82" letter-spacing="2">DESCRIPT</text>
  <text x="1220" y="634" text-anchor="middle" font-size="14" font-weight="600" fill="#4d90f5" fill-opacity="0.9" letter-spacing="3">EDITING</text>
</svg>
