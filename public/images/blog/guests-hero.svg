<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="Abstract network of podcast guest connections">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#e57329" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#e57329" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow)"/>
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="3">
    <line x1="800" y1="420" x2="420" y2="220"/>
    <line x1="800" y1="420" x2="360" y2="560"/>
    <line x1="800" y1="420" x2="620" y2="680"/>
    <line x1="800" y1="420" x2="1180" y2="230"/>
    <line x1="800" y1="420" x2="1240" y2="540"/>
    <line x1="800" y1="420" x2="980" y2="680"/>
  </g>
  <g>
    <circle cx="420" cy="220" r="42" fill="#ffffff" fill-opacity="0.18"/>
    <circle cx="360" cy="560" r="34" fill="#ffffff" fill-opacity="0.14"/>
    <circle cx="620" cy="680" r="30" fill="#ffffff" fill-opacity="0.14"/>
    <circle cx="1180" cy="230" r="46" fill="#e57329"/>
    <circle cx="1240" cy="540" r="34" fill="#ffffff" fill-opacity="0.16"/>
    <circle cx="980" cy="680" r="30" fill="#ffffff" fill-opacity="0.14"/>
  </g>
  <!-- central mic node -->
  <g transform="translate(800 420)">
    <circle r="92" fill="#e57329" fill-opacity="0.15"/>
    <circle r="66" fill="#26374e" stroke="#f0904f" stroke-width="4"/>
    <rect x="-18" y="-40" width="36" height="58" rx="18" fill="#f0904f"/>
    <path d="M-30 4 a30 30 0 0 0 60 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="34" x2="0" y2="52" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <line x1="-16" y1="52" x2="16" y2="52" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
