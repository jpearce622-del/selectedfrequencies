<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="A cost breakdown showing you can start a podcast for under 150 pounds: microphone 60 to 150 pounds, recording software free, cover art free, and hosting free to 15 pounds a month" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="560" rx="24" fill="#f5f5f7"/>
  <text x="60" y="72" font-size="30" font-weight="600" fill="#1d1d1f">What it costs to start in 2026</text>
  <text x="60" y="110" font-size="20" fill="#6e6e73">A complete, launch-ready setup for under £150</text>

  <!-- cost tiles -->
  <g>
    <g transform="translate(60 150)">
      <rect x="0" y="0" width="255" height="200" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="24" y="52" font-size="19" font-weight="600" fill="#6e6e73">Microphone</text>
      <text x="24" y="112" font-size="40" font-weight="700" fill="#1d1d1f">£60–150</text>
      <text x="24" y="150" font-size="16" fill="#6e6e73">One good USB mic</text>
    </g>
    <g transform="translate(335 150)">
      <rect x="0" y="0" width="255" height="200" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="24" y="52" font-size="19" font-weight="600" fill="#6e6e73">Recording software</text>
      <text x="24" y="112" font-size="40" font-weight="700" fill="#e57329">Free</text>
      <text x="24" y="150" font-size="16" fill="#6e6e73">Audacity / GarageBand</text>
    </g>
    <g transform="translate(610 150)">
      <rect x="0" y="0" width="255" height="200" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="24" y="52" font-size="19" font-weight="600" fill="#6e6e73">Cover art</text>
      <text x="24" y="112" font-size="40" font-weight="700" fill="#e57329">Free</text>
      <text x="24" y="150" font-size="16" fill="#6e6e73">Canva template</text>
    </g>
    <g transform="translate(885 150)">
      <rect x="0" y="0" width="255" height="200" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="24" y="52" font-size="19" font-weight="600" fill="#6e6e73">Hosting</text>
      <text x="24" y="112" font-size="38" font-weight="700" fill="#1d1d1f">£0–15</text>
      <text x="24" y="150" font-size="16" fill="#6e6e73">per month</text>
    </g>
  </g>

  <!-- total bar -->
  <g transform="translate(60 400)">
    <rect x="0" y="0" width="1080" height="96" rx="18" fill="#26374e"/>
    <text x="36" y="58" font-size="24" font-weight="600" fill="#ffffff">Total to launch</text>
    <text x="1044" y="60" text-anchor="end" font-size="40" font-weight="700" fill="#f0904f">Under £150</text>
  </g>
</svg>
