<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-label="A milestone path rising toward a record button, over an audio waveform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3e57"/>
      <stop offset="1" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="rec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0904f"/>
      <stop offset="1" stop-color="#e57329"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.74" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#e57329" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e57329" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow)"/>
  <line x1="0" y1="420" x2="1600" y2="420" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- subtle waveform baseline -->
  <g fill="#ffffff" fill-opacity="0.12">
    <rect x="150" y="560" width="12" height="60"  rx="6"/>
    <rect x="188" y="530" width="12" height="120" rx="6"/>
    <rect x="226" y="500" width="12" height="180" rx="6"/>
    <rect x="264" y="540" width="12" height="100" rx="6"/>
    <rect x="302" y="510" width="12" height="160" rx="6"/>
    <rect x="340" y="480" width="12" height="220" rx="6"/>
    <rect x="378" y="540" width="12" height="100" rx="6"/>
    <rect x="416" y="520" width="12" height="140" rx="6"/>
  </g>

  <!-- rising milestone path -->
  <path d="M180 620 C 460 620, 520 380, 820 360 S 1000 300, 1120 280"
    fill="none" stroke="#f0904f" stroke-opacity="0.4" stroke-width="4" stroke-dasharray="2 16" stroke-linecap="round"/>
  <g>
    <circle cx="180" cy="620" r="20" fill="#26374e" stroke="#f0904f" stroke-width="4"/>
    <text x="180" y="628" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#ffffff">1</text>
    <circle cx="470" cy="512" r="18" fill="#26374e" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>
    <circle cx="700" cy="392" r="18" fill="#26374e" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>
    <circle cx="930" cy="336" r="18" fill="#26374e" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>
  </g>

  <!-- record button target -->
  <g transform="translate(1200 300)">
    <circle r="160" fill="none" stroke="#f0904f" stroke-opacity="0.15" stroke-width="2"/>
    <circle r="120" fill="url(#rec)"/>
    <circle r="120" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
    <circle r="52" fill="#ffffff"/>
  </g>
</svg>
