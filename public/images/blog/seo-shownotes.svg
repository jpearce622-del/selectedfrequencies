<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="The anatomy of SEO-friendly podcast show notes, with each element labelled" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="660" rx="24" fill="#f5f5f7"/>
  <text x="60" y="72" font-size="30" font-weight="600" fill="#1d1d1f">What search engines actually read</text>
  <text x="60" y="110" font-size="20" fill="#6e6e73">Audio is invisible to crawlers — your show notes are the page</text>

  <!-- document -->
  <g transform="translate(60 150)">
    <rect x="0" y="0" width="700" height="470" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>

    <!-- episode title (H1) -->
    <rect x="32" y="34" width="470" height="26" rx="8" fill="#26374e"/>
    <!-- description w/ keyword highlight -->
    <rect x="32" y="92"  width="636" height="14" rx="7" fill="#c9ccd1"/>
    <rect x="32" y="118" width="300" height="14" rx="7" fill="#e57329"/>
    <rect x="344" y="118" width="300" height="14" rx="7" fill="#c9ccd1"/>
    <rect x="32" y="144" width="560" height="14" rx="7" fill="#c9ccd1"/>

    <!-- chapters/timestamps -->
    <g fill="#26374e">
      <rect x="32" y="196" width="70" height="20" rx="6" fill="#f0904f"/>
      <rect x="118" y="198" width="360" height="14" rx="7" fill="#c9ccd1"/>
      <rect x="32" y="228" width="70" height="20" rx="6" fill="#f0904f"/>
      <rect x="118" y="230" width="300" height="14" rx="7" fill="#c9ccd1"/>
      <rect x="32" y="260" width="70" height="20" rx="6" fill="#f0904f"/>
      <rect x="118" y="262" width="330" height="14" rx="7" fill="#c9ccd1"/>
    </g>

    <!-- links -->
    <rect x="32" y="312" width="220" height="14" rx="7" fill="#e57329"/>
    <rect x="32" y="338" width="180" height="14" rx="7" fill="#e57329"/>

    <!-- transcript block -->
    <rect x="24" y="378" width="652" height="72" rx="12" fill="#f5f5f7"/>
    <g fill="#c9ccd1">
      <rect x="40" y="396" width="620" height="10" rx="5"/>
      <rect x="40" y="414" width="600" height="10" rx="5"/>
      <rect x="40" y="432" width="560" height="10" rx="5"/>
    </g>
  </g>

  <!-- labels -->
  <g font-size="19" font-weight="600">
    <g transform="translate(800 168)">
      <rect x="0" y="0" width="340" height="58" rx="12" fill="#26374e"/>
      <text x="20" y="26" fill="#ffffff">Keyword-led title</text>
      <text x="20" y="48" font-size="14" font-weight="400" fill="#ffffff" fill-opacity="0.7">The single biggest ranking signal</text>
    </g>
    <g transform="translate(800 244)">
      <rect x="0" y="0" width="340" height="58" rx="12" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="20" y="26" fill="#1d1d1f">Description + target phrase</text>
      <text x="20" y="48" font-size="14" font-weight="400" fill="#6e6e73">First 2 lines carry the most weight</text>
    </g>
    <g transform="translate(800 320)">
      <rect x="0" y="0" width="340" height="58" rx="12" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="20" y="26" fill="#1d1d1f">Chapters &amp; timestamps</text>
      <text x="20" y="48" font-size="14" font-weight="400" fill="#6e6e73">Structure Google can index</text>
    </g>
    <g transform="translate(800 396)">
      <rect x="0" y="0" width="340" height="58" rx="12" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <text x="20" y="26" fill="#1d1d1f">Guest &amp; resource links</text>
      <text x="20" y="48" font-size="14" font-weight="400" fill="#6e6e73">Outbound authority + backlinks</text>
    </g>
    <g transform="translate(800 472)">
      <rect x="0" y="0" width="340" height="58" rx="12" fill="#e57329"/>
      <text x="20" y="26" fill="#ffffff">Full transcript</text>
      <text x="20" y="48" font-size="14" font-weight="400" fill="#ffffff" fill-opacity="0.85">Thousands of indexable words</text>
    </g>
  </g>
</svg>
