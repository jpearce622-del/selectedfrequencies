<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="The podcast audio signal chain from microphone to published episode" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="560" rx="24" fill="#f5f5f7"/>
  <text x="60" y="72" font-size="30" font-weight="600" fill="#1d1d1f">The signal chain: where quality is won or lost</text>
  <text x="60" y="110" font-size="20" fill="#6e6e73">Every stage can only preserve what the one before it captured</text>

  <!-- connectors -->
  <g stroke="#c9ccd1" stroke-width="3">
    <line x1="235" y1="300" x2="305" y2="300"/>
    <line x1="490" y1="300" x2="560" y2="300"/>
    <line x1="745" y1="300" x2="815" y2="300"/>
    <line x1="1000" y1="300" x2="1070" y2="300" opacity="0"/>
  </g>
  <g fill="#c9ccd1">
    <path d="M305 300 l-18 -9 v18 z"/>
    <path d="M560 300 l-18 -9 v18 z"/>
    <path d="M815 300 l-18 -9 v18 z"/>
  </g>

  <!-- stage cards -->
  <g>
    <!-- capture -->
    <g transform="translate(60 210)">
      <rect x="0" y="0" width="175" height="180" rx="16" fill="#26374e"/>
      <g transform="translate(87 66)" fill="none" stroke="#f0904f" stroke-width="5" stroke-linecap="round">
        <rect x="-15" y="-30" width="30" height="46" rx="15" fill="#f0904f" stroke="none"/>
        <path d="M-24 4 a24 24 0 0 0 48 0"/>
        <line x1="0" y1="28" x2="0" y2="44"/>
        <line x1="-14" y1="44" x2="14" y2="44"/>
      </g>
      <text x="87" y="150" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">Capture</text>
    </g>
    <!-- interface -->
    <g transform="translate(315 210)">
      <rect x="0" y="0" width="175" height="180" rx="16" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <g transform="translate(87 60)">
        <rect x="-40" y="-24" width="80" height="48" rx="10" fill="none" stroke="#26374e" stroke-width="5"/>
        <circle cx="-18" cy="0" r="8" fill="#e57329"/>
        <circle cx="14" cy="0" r="8" fill="#26374e"/>
      </g>
      <text x="87" y="150" text-anchor="middle" font-size="20" font-weight="600" fill="#1d1d1f">Interface</text>
    </g>
    <!-- record/DAW -->
    <g transform="translate(570 210)">
      <rect x="0" y="0" width="175" height="180" rx="16" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <g transform="translate(87 60)" fill="#e57329">
        <rect x="-40" y="-6" width="8" height="12" rx="4" opacity="0.5"/>
        <rect x="-26" y="-20" width="8" height="40" rx="4"/>
        <rect x="-12" y="-30" width="8" height="60" rx="4"/>
        <rect x="2"  y="-16" width="8" height="32" rx="4"/>
        <rect x="16" y="-26" width="8" height="52" rx="4"/>
        <rect x="30" y="-8"  width="8" height="16" rx="4" opacity="0.5"/>
      </g>
      <text x="87" y="150" text-anchor="middle" font-size="20" font-weight="600" fill="#1d1d1f">Record</text>
    </g>
    <!-- edit -->
    <g transform="translate(825 210)">
      <rect x="0" y="0" width="175" height="180" rx="16" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.5"/>
      <g transform="translate(87 60)" stroke="#26374e" stroke-width="5" fill="none" stroke-linecap="round">
        <path d="M-34 0 h20"/>
        <path d="M6 0 h28"/>
        <rect x="-14" y="-16" width="20" height="32" rx="6" fill="#f0904f" stroke="none"/>
      </g>
      <text x="87" y="150" text-anchor="middle" font-size="20" font-weight="600" fill="#1d1d1f">Edit</text>
    </g>
    <!-- master + publish -->
    <g transform="translate(1010 210)">
      <rect x="0" y="0" width="130" height="180" rx="16" fill="#e57329"/>
      <g transform="translate(65 60)" fill="#ffffff">
        <circle r="30" fill="none" stroke="#ffffff" stroke-width="5"/>
        <path d="M-12 0 l8 8 l16 -18" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="65" y="150" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">Master</text>
    </g>
  </g>

  <text x="60" y="470" font-size="19" fill="#6e6e73">A quiet room and good mic technique at <tspan font-weight="600" fill="#1d1d1f">Capture</tspan> save hours everywhere downstream.</text>
</svg>
