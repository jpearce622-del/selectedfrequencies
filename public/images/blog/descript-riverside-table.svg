<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A comparison table of Riverside and Descript across best-for, recording, editing, AI features, and pricing" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="640" rx="24" fill="#f5f5f7"/>
  <text x="60" y="66" font-size="30" font-weight="600" fill="#1d1d1f">Riverside vs Descript at a glance</text>

  <!-- column headers -->
  <g>
    <rect x="470" y="96" width="330" height="60" rx="12" fill="#26374e"/>
    <text x="635" y="134" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">Riverside</text>
    <rect x="820" y="96" width="330" height="60" rx="12" fill="#e57329"/>
    <text x="985" y="134" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">Descript</text>
  </g>

  <!-- rows -->
  <g font-size="19" fill="#1d1d1f">
    <!-- row labels -->
    <text x="60" y="204" font-weight="600" fill="#6e6e73">Best for</text>
    <text x="60" y="280" font-weight="600" fill="#6e6e73">Recording</text>
    <text x="60" y="356" font-weight="600" fill="#6e6e73">Editing</text>
    <text x="60" y="432" font-weight="600" fill="#6e6e73">AI features</text>
    <text x="60" y="508" font-weight="600" fill="#6e6e73">Video &amp; clips</text>
    <text x="60" y="584" font-weight="600" fill="#6e6e73">Pricing</text>
  </g>

  <!-- separators -->
  <g stroke="#e6e6ea" stroke-width="1.5">
    <line x1="60" y1="228" x2="1150" y2="228"/>
    <line x1="60" y1="304" x2="1150" y2="304"/>
    <line x1="60" y1="380" x2="1150" y2="380"/>
    <line x1="60" y1="456" x2="1150" y2="456"/>
    <line x1="60" y1="532" x2="1150" y2="532"/>
  </g>

  <!-- Riverside column cells -->
  <g font-size="18" fill="#1d1d1f" text-anchor="middle">
    <text x="635" y="204">Remote recording</text>
    <text x="635" y="280" font-weight="600" fill="#e57329">Best in class</text>
    <text x="635" y="356">Good, improving</text>
    <text x="635" y="432">AI clips, show notes</text>
    <text x="635" y="508" font-weight="600" fill="#e57329">Records 4K video</text>
    <text x="635" y="584">Free tier + paid</text>
  </g>

  <!-- Descript column cells -->
  <g font-size="18" fill="#1d1d1f" text-anchor="middle">
    <text x="985" y="204">Editing &amp; polishing</text>
    <text x="985" y="280">Fine locally</text>
    <text x="985" y="356" font-weight="600" fill="#e57329">Best in class</text>
    <text x="985" y="432" font-weight="600" fill="#e57329">Text-edit, Studio Sound</text>
    <text x="985" y="508">Edits video + clips</text>
    <text x="985" y="584">Free tier + paid</text>
  </g>
</svg>
